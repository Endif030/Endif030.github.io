<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闪卡复习 - 攀岩技术学习工坊</title>
  <link rel="stylesheet" href="css/minimal.css">
  <style>
    .flashcard-container { max-width: 600px; margin: 48px auto; }
    .flashcard { background: white; border-radius: 16px; padding: 48px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.3s; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
    .flashcard:hover { transform: translateY(-4px); }
    .flashcard-number { font-size: 14px; color: #F59E0B; margin-bottom: 16px; }
    .flashcard-title { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
    .flashcard-content { font-size: 16px; color: #6B7280; line-height: 1.6; }
    .flashcard-controls { display: flex; justify-content: center; gap: 16px; margin-top: 32px; }
    .progress-bar { width: 100%; height: 4px; background: #E5E7EB; border-radius: 2px; margin-bottom: 32px; }
    .progress-fill { height: 100%; background: #FBBF24; border-radius: 2px; transition: width 0.3s; }
    .keyboard-hint { text-align: center; color: #9CA3AF; font-size: 14px; margin-top: 24px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="logo">🧗 攀岩技术学习工坊</a>
        <div class="nav-links">
          <a href="index.html">首页</a>
          <a href="learn.html">学习</a>
          <a href="flashcard.html" class="active">闪卡</a>
          <a href="roots.html">索引</a>
          <a href="progress.html">进度</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="flashcard-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flashcard-number" id="cardNumber">1 / 30</div>
        <div class="flashcard-title" id="cardTitle">点击开始</div>
        <div class="flashcard-content" id="cardContent">使用键盘 ← → 翻页，空格键翻转</div>
      </div>
      
      <div class="flashcard-controls">
        <button class="btn btn-secondary" onclick="prevCard()">← 上一个</button>
        <button class="btn btn-primary" onclick="markLearned()">✓ 已掌握</button>
        <button class="btn btn-secondary" onclick="nextCard()">下一个 →</button>
      </div>
      
      <p class="keyboard-hint">快捷键：← → 翻页 | 空格 翻转</p>
    </div>
  </main>

  <script src="js/wordData.js"></script>
  <script src="js/storage.js"></script>
  <script>
    let current = 0;
    let flipped = false;
    
    function updateCard() {
      const item = WordRoots[current];
      document.getElementById('cardNumber').textContent = `${item.id} / ${WordRoots.length}`;
      document.getElementById('progressFill').style.width = `${((current + 1) / WordRoots.length) * 100}%`;
      
      if (!flipped) {
        document.getElementById('cardTitle').textContent = item.root;
        document.getElementById('cardContent').textContent = item.meaning;
      } else {
        document.getElementById('cardTitle').textContent = item.root;
        document.getElementById('cardContent').textContent = item.description.substring(0, 150) + '...';
      }
    }
    
    function flipCard() {
      flipped = !flipped;
      updateCard();
    }
    
    function nextCard() {
      if (current < WordRoots.length - 1) {
        current++;
        flipped = false;
        updateCard();
      }
    }
    
    function prevCard() {
      if (current > 0) {
        current--;
        flipped = false;
        updateCard();
      }
    }
    
    function markLearned() {
      const item = WordRoots[current];
      Storage.setLearned(item.id);
      alert(`已标记 "${item.root}" 为已掌握！`);
    }
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextCard();
      if (e.key === 'ArrowLeft') prevCard();
      if (e.key === ' ') { e.preventDefault(); flipCard(); }
    });
    
    document.addEventListener('DOMContentLoaded', updateCard);
  </script>
</body>
</html>
