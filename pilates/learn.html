<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习 - 普拉提学习工坊</title>
  <link rel="stylesheet" href="css/minimal.css">
  <style>
    .learn-container { max-width: 800px; margin: 0 auto; padding: 48px 0; }
    .learn-card { background: white; border-radius: 16px; padding: 48px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 32px; }
    .learn-header { border-bottom: 2px solid #F3F4F6; padding-bottom: 24px; margin-bottom: 32px; }
    .learn-number { font-size: 14px; color: #F59E0B; font-weight: 600; margin-bottom: 8px; }
    .learn-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .learn-meaning { font-size: 18px; color: #6B7280; }
    .learn-section { margin-bottom: 32px; }
    .learn-section h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .learn-section p { font-size: 16px; line-height: 1.8; color: #4B5563; }
    .example-card { background: #F9FAFB; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .example-card h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .example-card p { font-size: 14px; color: #6B7280; margin: 0; }
    .quiz-section { background: #FEF3C7; border-radius: 12px; padding: 24px; margin-top: 32px; }
    .quiz-option { display: block; width: 100%; text-align: left; padding: 16px; margin-bottom: 8px; background: white; border: 2px solid #E5E7EB; border-radius: 8px; cursor: pointer; }
    .quiz-option:hover { border-color: #FBBF24; }
    .quiz-option.correct { background: #D1FAE5; border-color: #10B981; }
    .quiz-option.wrong { background: #FEE2E2; border-color: #EF4444; }
    .learn-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; padding-top: 32px; border-top: 2px solid #F3F4F6; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="logo">🧘 普拉提学习工坊</a>
        <div class="nav-links">
          <a href="index.html">首页</a>
          <a href="learn.html" class="active">学习</a>
          <a href="flashcard.html">闪卡</a>
          <a href="roots.html">索引</a>
          <a href="progress.html">进度</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="learn-container">
      <div id="learnContent"></div>
    </div>
  </main>

  <script src="js/wordData.js"></script>
  <script src="js/storage.js"></script>
  <script>
    let currentId = 1;
    
    function renderLearn(item) {
      const content = document.getElementById('learnContent');
      const quizHtml = item.quiz ? `
        <div class="quiz-section">
          <h3>📝 小测试</h3>
          <p style="margin-bottom: 16px;">${item.quiz.question}</p>
          ${item.quiz.options.map((opt, idx) => `
            <button class="quiz-option" onclick="checkAnswer(${idx}, ${item.quiz.correctAnswer}, this)">${opt}</button>
          `).join('')}
        </div>
      ` : '';
      
      const examplesHtml = item.examples ? item.examples.map(ex => `
        <div class="example-card">
          <h4>${ex.word}</h4>
          <p>${ex.explanation || ex.meaning}</p>
        </div>
      `).join('') : '';
      
      content.innerHTML = `
        <div class="learn-card">
          <div class="learn-header">
            <div class="learn-number">${item.origin} · #${item.id}</div>
            <div class="learn-title">${item.root}</div>
            <div class="learn-meaning">${item.meaning}</div>
          </div>
          
          <div class="learn-section">
            <h3>📖 详细说明</h3>
            <p>${item.description}</p>
          </div>
          
          ${examplesHtml ? `
          <div class="learn-section">
            <h3>💡 应用示例</h3>
            ${examplesHtml}
          </div>
          ` : ''}
          
          ${quizHtml}
          
          <div class="learn-nav">
            <button class="btn btn-secondary" onclick="prevItem()" ${item.id <= 1 ? 'disabled' : ''}>← 上一个</button>
            <button class="btn btn-primary" onclick="markLearned(${item.id})">✓ 标记为已掌握</button>
            <button class="btn btn-secondary" onclick="nextItem()" ${item.id >= WordRoots.length ? 'disabled' : ''}>下一个 →</button>
          </div>
        </div>
      `;
    }
    
    function checkAnswer(selected, correct, btn) {
      const buttons = document.querySelectorAll('.quiz-option');
      buttons[correct].classList.add('correct');
      if (selected !== correct) {
        btn.classList.add('wrong');
      }
      buttons.forEach(b => b.disabled = true);
    }
    
    function markLearned(id) {
      Storage.setLearned(id);
      alert('已标记为已掌握！');
    }
    
    function prevItem() {
      if (currentId > 1) {
        currentId--;
        renderLearn(WordRoots[currentId - 1]);
        history.replaceState(null, null, `?id=${currentId}`);
      }
    }
    
    function nextItem() {
      if (currentId < WordRoots.length) {
        currentId++;
        renderLearn(WordRoots[currentId - 1]);
        history.replaceState(null, null, `?id=${currentId}`);
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(location.search);
      const id = parseInt(params.get('id')) || 1;
      currentId = Math.max(1, Math.min(id, WordRoots.length));
      renderLearn(WordRoots[currentId - 1]);
    });
  </script>
</body>
</html>
